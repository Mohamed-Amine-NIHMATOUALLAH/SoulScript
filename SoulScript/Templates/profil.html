{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
        }
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #111;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .btn-custom {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-custom:hover {
            background-color: #ccc;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-container text-center">
        <h2>Mon Profil</h2>
        <hr>

        {% if user.is_authenticated %}
            <p><strong>Nom :</strong> {{ user.last_name }}</p>
            <p><strong>Prénom :</strong> {{ user.first_name }}</p>
            <p><strong>Email :</strong> {{ user.email }}</p>

            <div class="d-flex justify-content-between mt-3">
                <a href="{% url 'change_email' %}" class="btn btn-custom">Changer l'email</a>
                <a href="{% url 'password_change' %}" class="btn btn-custom">Changer le mot de passe</a>
            </div>
        {% else %}
            <p>Vous n'êtes pas connecté. <a href="{% url 'login' %}" class="text-white">Se connecter</a></p>
        {% endif %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
{% endblock %}
