<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Articles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; }
        .container { width: 80%; margin: 20px auto; background: #111; padding: 20px; box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        th, td { border: 1px solid #555; padding: 10px; text-align: left; }
        th { background-color: #222; }
        .btn { padding: 5px 10px; border: none; cursor: pointer; }
        .edit { background-color: #f0ad4e; color: white; }
        .delete { background-color: #d9534f; color: white; }
        .ajout-article { display: inline-block; padding: 10px 15px; background-color: #007bff; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .ajout-article:hover { background-color: #0056b3; }
        a { color: #0dcaf0; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img src="logo.png"></a>
            <div>
                <a class="text-white me-3" href="#">Accueil</a>
                <a class="text-white me-3" href="#">Articles</a>
                <select class="form-select d-inline-block w-auto bg-dark text-white">
                    <option>Rechercher par catégorie</option>
                    <option value="Certificat">Certificat</option>
                    <option value="Diplôme">Diplôme</option>
                    <option value="CV">CV</option>
                    <option value="Lettre de motivation">Lettre de motivation</option>
                    <option value="Stage">Stage</option>
                    <option value="Accréditation professionnelle">Accréditation professionnelle</option>
                  </select>
            </div>
            <div>
                <a href="{% url 'profil'%}" class="btn btn-outline-light me-2">👤</a>
                <button class="btn btn-danger">Déconnexion</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h2>Mes Articles</h2>
        <table>
            <thead>
                <tr>
                    <th>{{images.image}}</th>
                    <th>Nom : {{ articles.nom }}</th>
                    <th>Date de Création : {{ articles.creation_date }}</th>
                    <th>Catégorie : {{ articles.categorie }}</th>
                    <th>discription : {{ articles.description }}</th>
                    <th>
                        <button href="{% url 'ajout_article'%}" class="btn edit">Modifier</button>
                        <button class="btn delete">Supprimer</button>
                    </th>
                </tr>
            </thead>
        </table><br><br>
        <a href="{% url 'ajout_article' %}" class="ajout-article">Ajouter un article</a>
    </div>

    <script>
        function searchByCategory(category) {
            let rows = document.querySelectorAll("#articlesTable tr");
            rows.forEach(row => {
                let cat = row.cells[2].textContent;
                if (category === "" || cat === category) {
                    row.style.display = "table-row";
                } else {
                    row.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
